name: Deploy to GitHub Pages

on:
  push:
    branches: ['main']

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # 🚨 已經幫你刪除咗 cache: 'npm' 嗰行！

      - name: Install Dependencies
        run: npm install

      - name: Fetch FRED yield curve
        env:
          FRED_API_KEY: ${{ secrets.VITE_FRED_API_KEY }}
        run: |
          mkdir -p public
          SERIES="DGS1MO DGS3MO DGS6MO DGS1 DGS2 DGS3 DGS5 DGS7 DGS10 DGS20 DGS30"
          YEARS="0.0833 0.25 0.5 1 2 3 5 7 10 20 30"
          echo '{"points":[' > /tmp/curve.json
          FIRST=true; i=0
          for S in $SERIES; do
            Y=$(echo $YEARS | cut -d' ' -f$((i+1)))
            R=$(curl -sf "https://api.stlouisfed.org/fred/series/observations?series_id=${S}&api_key=${FRED_API_KEY}&file_type=json&sort_order=desc&limit=1" || echo '{}')
            V=$(echo "$R" | jq -r '.observations[0].value // empty')
            D=$(echo "$R" | jq -r '.observations[0].date // empty')
            if [ -n "$V" ] && [ "$V" != "." ]; then
              $FIRST || echo ',' >> /tmp/curve.json; FIRST=false
              echo "{\"id\":\"${S}\",\"years\":${Y},\"yield\":${V},\"date\":\"${D}\"}" >> /tmp/curve.json
            fi
            i=$((i+1))
          done
          echo "],\"updatedAt\":\"$(date -u +%Y-%m-%d)\"}" >> /tmp/curve.json
          if jq . /tmp/curve.json > /dev/null 2>&1; then
            cp /tmp/curve.json public/yield-curve.json
            echo "yield-curve.json: $(jq '.points|length' public/yield-curve.json) points"
          else
            echo "FRED fetch failed, keeping placeholder"
          fi
          cat public/yield-curve.json

      - name: Build Project
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
          VITE_FRED_API_KEY: ${{ secrets.VITE_FRED_API_KEY }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
