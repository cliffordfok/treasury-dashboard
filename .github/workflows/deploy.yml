name: Deploy to GitHub Pages

on:
  push:
    branches: ['main']

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # 🚨 已經幫你刪除咗 cache: 'npm' 嗰行！

      - name: Install Dependencies
        run: npm install

      - name: Fetch FRED yield curve
        env:
          FRED_API_KEY: ${{ secrets.VITE_FRED_API_KEY }}
        run: |
          set -u

          if [ -z "${FRED_API_KEY:-}" ]; then
            echo "FRED_API_KEY is missing; using checked-in public/yield-curve.json"
            cat public/yield-curve.json
            exit 0
          fi

          SERIES="DGS1MO DGS3MO DGS6MO DGS1 DGS2 DGS3 DGS5 DGS7 DGS10 DGS20 DGS30"
          YEARS="0.0833 0.25 0.5 1 2 3 5 7 10 20 30"

          fetch_series() {
            local series_id="$1"
            local url="https://api.stlouisfed.org/fred/series/observations?series_id=${series_id}&api_key=${FRED_API_KEY}&file_type=json&sort_order=desc&limit=1"
            local body status attempt
            body="$(mktemp)"

            for attempt in 1 2 3; do
              status="$(curl -sS --retry 2 --retry-delay 5 --retry-all-errors -w '%{http_code}' -o "$body" "$url" || true)"
              if [ "$status" = "200" ]; then
                cat "$body"
                rm -f "$body"
                return 0
              fi

              echo "FRED ${series_id} returned HTTP ${status} on attempt ${attempt}/3" >&2
              sed -e 's/api_key=[^&]*/api_key=***REDACTED***/g' "$body" >&2 || true
              sleep 10
            done

            rm -f "$body"
            return 1
          }

          mkdir -p public
          echo '{"points":[' > /tmp/curve.json
          FIRST=true
          POINTS=0
          i=0

          for SERIES_ID in $SERIES; do
            YEAR=$(echo "$YEARS" | cut -d' ' -f$((i+1)))

            if RESP=$(fetch_series "$SERIES_ID"); then
              VALUE=$(echo "$RESP" | jq -r '.observations[0].value // empty')
              DATE=$(echo "$RESP" | jq -r '.observations[0].date // empty')

              if [ -n "$VALUE" ] && [ "$VALUE" != "." ]; then
                if [ "$FIRST" = true ]; then FIRST=false; else echo ',' >> /tmp/curve.json; fi
                jq -n \
                  --arg id "$SERIES_ID" \
                  --argjson years "$YEAR" \
                  --argjson yield "$VALUE" \
                  --arg date "$DATE" \
                  '{id: $id, years: $years, yield: $yield, date: $date}' >> /tmp/curve.json
                POINTS=$((POINTS+1))
              else
                echo "FRED ${SERIES_ID} has no latest observation value; skipping" >&2
              fi
            else
              echo "FRED ${SERIES_ID} failed after retries; skipping" >&2
            fi

            i=$((i+1))
          done

          echo '],"updatedAt":"'$(date -u +%Y-%m-%d)'"}' >> /tmp/curve.json

          if [ "$POINTS" -gt 0 ] && jq . /tmp/curve.json > /dev/null 2>&1; then
            cp /tmp/curve.json public/yield-curve.json
            echo "yield-curve.json: ${POINTS} points"
          else
            echo "FRED fetch failed, keeping checked-in public/yield-curve.json"
          fi

          cat public/yield-curve.json

      - name: Build Project
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
          VITE_FRED_API_KEY: ${{ secrets.VITE_FRED_API_KEY }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
